name: release-candidate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify public release candidate
        env:
          CI: true
        run: pnpm verify:release-candidate

      - name: Publish release-candidate summary
        if: always()
        run: cat tooling/release/release-candidate-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release-candidate summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-summary
          path: tooling/release/release-candidate-summary.md
