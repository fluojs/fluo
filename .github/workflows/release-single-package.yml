# Deprecated single-package release
# Governance: Changesets release automation is canonical. This workflow is retained
# only to make legacy dispatch attempts fail with a clear migration message.
name: Deprecated single-package release

on:
  workflow_dispatch:
    inputs: {}

concurrency:
  group: deprecated-release-single-package
  cancel-in-progress: false

jobs:
  deprecated:
    name: Deprecated workflow guard
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Stop legacy single-package release dispatch
        run: |
          echo "::error::This workflow is deprecated and cannot publish packages. Use the Changesets Release workflow and merge the Version Packages PR instead."
          exit 1
